<!doctype html>
<html lang="fr">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TechCorp — Financial Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        mono: ['JetBrains Mono', 'ui-monospace', 'monospace'],
                    },
                    colors: {
                        ink: {
                            50: '#fafafa', 100: '#f4f4f5', 200: '#e4e4e7',
                            300: '#d4d4d8', 400: '#a1a1aa', 500: '#71717a',
                            600: '#52525b', 700: '#3f3f46', 800: '#27272a',
                            900: '#18181b', 950: '#09090b',
                        },
                    },
                    animation: { 'fade-in': 'fadeIn 0.25s ease-out' },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0', transform: 'translateY(4px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                    },
                },
            },
        };
    </script>
    <style>
        :root { color-scheme: light; }
        body {
            font-family: 'Inter', sans-serif;
            font-feature-settings: 'cv11', 'ss01';
            -webkit-font-smoothing: antialiased;
        }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d4d4d8; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #a1a1aa; }

        .dot-typing { display: inline-flex; gap: 4px; align-items: center; padding: 6px 0; }
        .dot-typing span {
            width: 6px; height: 6px;
            background: #a1a1aa;
            border-radius: 50%;
            animation: dotPulse 1.4s infinite both;
        }
        .dot-typing span:nth-child(2) { animation-delay: 0.2s; }
        .dot-typing span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes dotPulse {
            0%, 80%, 100% { opacity: 0.2; transform: scale(0.85); }
            40% { opacity: 1; transform: scale(1); }
        }

        .md p { margin: 0.6em 0; }
        .md p:first-child { margin-top: 0; }
        .md p:last-child { margin-bottom: 0; }
        .md ul, .md ol { margin: 0.6em 0; padding-left: 1.4em; }
        .md li { margin: 0.2em 0; }
        .md ul li { list-style: disc; }
        .md ol li { list-style: decimal; }
        .md strong { font-weight: 600; color: #18181b; }
        .md em { font-style: italic; }
        .md code {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.875em;
            background: #f4f4f5;
            color: #18181b;
            padding: 0.1em 0.35em;
            border-radius: 4px;
            border: 1px solid #e4e4e7;
        }
        .md pre {
            background: #18181b;
            color: #f4f4f5;
            padding: 0.85rem 1rem;
            border-radius: 8px;
            overflow-x: auto;
            margin: 0.75em 0;
            font-size: 0.85em;
        }
        .md pre code { background: transparent; color: inherit; border: none; padding: 0; }
        .md h1, .md h2, .md h3 { font-weight: 600; margin: 0.8em 0 0.3em; color: #18181b; }
        .md h1 { font-size: 1.15em; }
        .md h2 { font-size: 1.05em; }
        .md h3 { font-size: 0.98em; }
    </style>
</head>
<body class="bg-white text-ink-900 h-screen flex flex-col overflow-hidden">

    <!-- Header -->
    <header class="border-b border-ink-200 bg-white/80 backdrop-blur-md z-20 shrink-0">
        <div class="max-w-3xl mx-auto px-6 h-14 flex items-center justify-between">
            <div class="flex items-center gap-2.5">
                <div class="w-7 h-7 rounded-md bg-ink-900 flex items-center justify-center">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 3v18h18"/><path d="m7 17 4-8 4 4 5-9"/>
                    </svg>
                </div>
                <div class="flex items-baseline gap-2">
                    <span class="font-semibold text-sm tracking-tight">TechCorp</span>
                    <span class="text-xs text-ink-500">Financial Assistant</span>
                </div>
            </div>

            <div class="flex items-center gap-1">
                <span class="flex items-center gap-1.5 text-xs text-ink-500 px-2.5 py-1 rounded-md">
                    <span id="status-dot" class="w-1.5 h-1.5 rounded-full bg-ink-300"></span>
                    <span id="status-label">connexion</span>
                </span>
                <button id="settings-btn" class="text-ink-500 hover:text-ink-900 hover:bg-ink-100 p-1.5 rounded-md transition" aria-label="Paramètres">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="3"/>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                    </svg>
                </button>
                <button id="reset-btn" class="text-ink-500 hover:text-ink-900 hover:bg-ink-100 p-1.5 rounded-md transition" aria-label="Nouvelle conversation">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 5v14M5 12h14"/>
                    </svg>
                </button>
            </div>
        </div>
    </header>

    <!-- Settings panel -->
    <div id="settings-panel" class="hidden border-b border-ink-200 bg-ink-50 shrink-0">
        <div class="max-w-3xl mx-auto px-6 py-4 grid grid-cols-1 md:grid-cols-3 gap-3">
            <label class="flex flex-col gap-1.5">
                <span class="text-xs font-medium text-ink-600 uppercase tracking-wide">Point de terminaison</span>
                <input id="api-url" type="text"
                    class="text-sm bg-white border border-ink-200 rounded-md px-3 py-1.5 font-mono focus:outline-none focus:border-ink-900 focus:ring-1 focus:ring-ink-900"
                    value="https://besides-withdrawal-realm-frog.trycloudflare.com" />
            </label>
            <label class="flex flex-col gap-1.5">
                <span class="text-xs font-medium text-ink-600 uppercase tracking-wide">Modèle</span>
                <input id="model-name" type="text"
                    class="text-sm bg-white border border-ink-200 rounded-md px-3 py-1.5 font-mono focus:outline-none focus:border-ink-900 focus:ring-1 focus:ring-ink-900"
                    value="phi3" />
            </label>
            <label class="flex flex-col gap-1.5">
                <span class="text-xs font-medium text-ink-600 uppercase tracking-wide">Température</span>
                <input id="temperature" type="number" min="0" max="2" step="0.1"
                    class="text-sm bg-white border border-ink-200 rounded-md px-3 py-1.5 font-mono focus:outline-none focus:border-ink-900 focus:ring-1 focus:ring-ink-900"
                    value="0.3" />
            </label>
        </div>
    </div>

    <!-- Main -->
    <main class="flex-1 flex flex-col min-h-0 relative">
        <div id="messages-container" class="flex-1 overflow-y-auto">
            <div id="messages" class="max-w-3xl mx-auto px-6 py-10 space-y-8"></div>
        </div>

        <!-- Welcome -->
        <div id="welcome" class="absolute inset-0 flex items-center justify-center pointer-events-none">
            <div class="max-w-md w-full mx-auto px-6 text-center pointer-events-auto">
                <div class="w-12 h-12 rounded-xl bg-ink-900 mx-auto mb-5 flex items-center justify-center">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 3v18h18"/><path d="m7 17 4-8 4 4 5-9"/>
                    </svg>
                </div>
                <h1 class="text-xl font-semibold tracking-tight mb-2">Comment puis-je vous aider ?</h1>
                <p class="text-sm text-ink-500 mb-8">
                    Posez vos questions sur la finance, les marchés, la comptabilité ou l'économie.
                </p>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-2 text-left">
                    <button class="suggestion text-sm border border-ink-200 hover:border-ink-400 hover:bg-ink-50 rounded-lg px-3.5 py-2.5 transition text-ink-700">
                        Différence entre actions et obligations
                    </button>
                    <button class="suggestion text-sm border border-ink-200 hover:border-ink-400 hover:bg-ink-50 rounded-lg px-3.5 py-2.5 transition text-ink-700">
                        Explique le ratio cours/bénéfice (PER)
                    </button>
                    <button class="suggestion text-sm border border-ink-200 hover:border-ink-400 hover:bg-ink-50 rounded-lg px-3.5 py-2.5 transition text-ink-700">
                        Les outils de la politique monétaire
                    </button>
                    <button class="suggestion text-sm border border-ink-200 hover:border-ink-400 hover:bg-ink-50 rounded-lg px-3.5 py-2.5 transition text-ink-700">
                        Construire un portefeuille diversifié
                    </button>
                </div>
            </div>
        </div>
    </main>

    <!-- Composer -->
    <div class="border-t border-ink-200 bg-white shrink-0">
        <div class="max-w-3xl mx-auto px-6 py-4">
            <form id="chat-form" class="relative">
                <textarea
                    id="input"
                    rows="1"
                    placeholder="Posez votre question financière..."
                    class="w-full resize-none bg-ink-50 border border-ink-200 rounded-xl pl-4 pr-12 py-3 text-sm leading-relaxed focus:outline-none focus:border-ink-900 focus:ring-1 focus:ring-ink-900 focus:bg-white transition placeholder:text-ink-400"
                    style="max-height: 200px;"></textarea>
                <button
                    id="send-btn"
                    type="submit"
                    class="absolute right-2 bottom-2 w-8 h-8 rounded-lg bg-ink-900 hover:bg-ink-700 disabled:bg-ink-300 disabled:cursor-not-allowed text-white flex items-center justify-center transition"
                    aria-label="Envoyer">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M5 12h14M13 6l6 6-6 6"/>
                    </svg>
                </button>
            </form>
            <p class="text-[11px] text-ink-400 mt-2.5 text-center">
                Contenu éducatif uniquement. Ne constitue pas un conseil en investissement.
            </p>
        </div>
    </div>

    <script>
        let messages = [];
        let inFlight = false;

        const $ = (id) => document.getElementById(id);
        const messagesEl = $("messages");
        const containerEl = $("messages-container");
        const welcomeEl = $("welcome");
        const formEl = $("chat-form");
        const inputEl = $("input");
        const sendBtn = $("send-btn");
        const statusDot = $("status-dot");
        const statusLabel = $("status-label");
        const settingsBtn = $("settings-btn");
        const settingsPanel = $("settings-panel");
        const resetBtn = $("reset-btn");

        settingsBtn.addEventListener("click", () => settingsPanel.classList.toggle("hidden"));
        resetBtn.addEventListener("click", () => {
            messages = [];
            messagesEl.innerHTML = "";
            welcomeEl.classList.remove("hidden");
            inputEl.focus();
        });

        document.querySelectorAll(".suggestion").forEach((btn) => {
            btn.addEventListener("click", () => {
                inputEl.value = btn.textContent.trim();
                inputEl.focus();
                inputEl.dispatchEvent(new Event("input"));
            });
        });

        inputEl.addEventListener("input", () => {
            inputEl.style.height = "auto";
            inputEl.style.height = Math.min(inputEl.scrollHeight, 200) + "px";
        });
        inputEl.addEventListener("keydown", (e) => {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                formEl.requestSubmit();
            }
        });

        function escapeHtml(str) {
            return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        }
        function renderMarkdown(src) {
            let html = escapeHtml(src);
            html = html.replace(/```(\w+)?\n?([\s\S]*?)```/g, (_, lang, code) =>
                `<pre><code>${code.trim()}</code></pre>`);
            html = html.replace(/`([^`\n]+)`/g, "<code>$1</code>");
            html = html.replace(/\*\*([^*\n]+)\*\*/g, "<strong>$1</strong>");
            html = html.replace(/(?<!\*)\*([^*\n]+)\*(?!\*)/g, "<em>$1</em>");
            html = html.replace(/^### (.+)$/gm, "<h3>$1</h3>");
            html = html.replace(/^## (.+)$/gm, "<h2>$1</h2>");
            html = html.replace(/^# (.+)$/gm, "<h1>$1</h1>");
            html = html.replace(/(?:^|\n)((?:[-*] .+(?:\n|$))+)/g, (m, items) => {
                const li = items.trim().split(/\n/).map(l => `<li>${l.replace(/^[-*]\s+/, "")}</li>`).join("");
                return `\n<ul>${li}</ul>`;
            });
            html = html.replace(/(?:^|\n)((?:\d+\. .+(?:\n|$))+)/g, (m, items) => {
                const li = items.trim().split(/\n/).map(l => `<li>${l.replace(/^\d+\.\s+/, "")}</li>`).join("");
                return `\n<ol>${li}</ol>`;
            });
            html = html.split(/\n{2,}/).map(b =>
                /^<(h[1-3]|ul|ol|pre)/.test(b.trim()) ? b : `<p>${b.replace(/\n/g, "<br>")}</p>`
            ).join("");
            return html;
        }

        function addMessage(role, content = "") {
            welcomeEl.classList.add("hidden");

            const wrapper = document.createElement("div");
            wrapper.className = "flex gap-3 animate-fade-in";

            const avatar = document.createElement("div");
            avatar.className = role === "user"
                ? "shrink-0 w-7 h-7 rounded-md bg-ink-200 text-ink-700 flex items-center justify-center text-[11px] font-semibold"
                : "shrink-0 w-7 h-7 rounded-md bg-ink-900 text-white flex items-center justify-center";
            if (role === "user") {
                avatar.textContent = "U";
            } else {
                avatar.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="m7 17 4-8 4 4 5-9"/></svg>';
            }

            const body = document.createElement("div");
            body.className = "flex-1 min-w-0 pt-0.5";

            const meta = document.createElement("div");
            meta.className = "text-[11px] font-medium text-ink-500 mb-1";
            meta.textContent = role === "user" ? "Vous" : "Assistant";

            const contentEl = document.createElement("div");
            contentEl.className = role === "user"
                ? "text-sm text-ink-900 leading-relaxed whitespace-pre-wrap"
                : "text-sm text-ink-700 leading-relaxed md";

            if (role === "assistant" && !content) {
                contentEl.innerHTML = '<div class="dot-typing"><span></span><span></span><span></span></div>';
            } else {
                contentEl.innerHTML = role === "assistant" ? renderMarkdown(content) : escapeHtml(content);
            }

            body.appendChild(meta);
            body.appendChild(contentEl);
            wrapper.appendChild(avatar);
            wrapper.appendChild(body);
            messagesEl.appendChild(wrapper);

            requestAnimationFrame(() => {
                containerEl.scrollTop = containerEl.scrollHeight;
            });

            return contentEl;
        }

        async function checkEndpoint() {
            try {
                const url = $("api-url").value.replace(/\/$/, "") + "/api/tags";
                const r = await fetch(url, { method: "GET" });
                if (!r.ok) throw new Error();
                statusDot.className = "w-1.5 h-1.5 rounded-full bg-emerald-500";
                statusLabel.textContent = "en ligne";
            } catch {
                statusDot.className = "w-1.5 h-1.5 rounded-full bg-red-500";
                statusLabel.textContent = "hors ligne";
            }
        }
        checkEndpoint();
        setInterval(checkEndpoint, 30000);

        async function sendMessage(userText) {
            if (inFlight) return;
            inFlight = true;
            sendBtn.disabled = true;

            messages.push({ role: "user", content: userText });
            addMessage("user", userText);
            const assistantEl = addMessage("assistant", "");
            let assistantText = "";

            const apiUrl = $("api-url").value.replace(/\/$/, "");
            const model = $("model-name").value.trim();
            const temperature = parseFloat($("temperature").value) || 0.3;

            try {
                const resp = await fetch(`${apiUrl}/v1/chat/completions`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ model, messages, temperature, stream: true }),
                });

                if (!resp.ok || !resp.body) {
                    const txt = await resp.text();
                    throw new Error(txt || `HTTP ${resp.status}`);
                }

                const reader = resp.body.getReader();
                const decoder = new TextDecoder();
                let buffer = "";

                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split("\n");
                    buffer = lines.pop();

                    for (const line of lines) {
                        const trimmed = line.trim();
                        if (!trimmed.startsWith("data:")) continue;
                        const payload = trimmed.slice(5).trim();
                        if (payload === "[DONE]") continue;
                        try {
                            const obj = JSON.parse(payload);
                            const delta = obj.choices?.[0]?.delta?.content || "";
                            if (delta) {
                                assistantText += delta;
                                assistantEl.innerHTML = renderMarkdown(assistantText);
                                containerEl.scrollTop = containerEl.scrollHeight;
                            }
                        } catch (_) { /* skip */ }
                    }
                }

                if (!assistantText) {
                    assistantEl.innerHTML = '<span class="text-ink-400 italic">Réponse vide.</span>';
                } else {
                    messages.push({ role: "assistant", content: assistantText });
                }
            } catch (err) {
                assistantEl.innerHTML = `<span class="text-red-600">Erreur : ${escapeHtml(String(err.message || err))}</span>`;
            } finally {
                inFlight = false;
                sendBtn.disabled = false;
                inputEl.focus();
            }
        }

        formEl.addEventListener("submit", (e) => {
            e.preventDefault();
            const text = inputEl.value.trim();
            if (!text) return;
            inputEl.value = "";
            inputEl.style.height = "auto";
            sendMessage(text);
        });

        inputEl.focus();
    </script>
</body>
</html>
